<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhihua Temple: The Four Steles</title>
    <style>
        :root {
            --gold: #d4af37;
            --bg: #121212;
            --panel: #1e1e1e;
            --text: #e0d8c3;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Hoefler Text', 'Noto Serif SC', 'Noto Serif TC', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-y: auto;
        }

        #kiosk-container {
            width: 95%;
            max-width: 850px;
            background: var(--panel);
            padding: 30px 50px;
            border-radius: 4px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            border-top: 2px solid var(--gold);
            text-align: center;
            position: relative;
        }

        #main-title {
            color: var(--gold);
            font-size: 1.4rem;
            margin: 0 0 20px 0;
            font-weight: normal;
            line-height: 1.4;
            text-align: center;
            letter-spacing: 1px;
        }

        #main-title span {
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        #media-main-area {
            margin-bottom: 15px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #main-display-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border: 1px solid #333;
            transition: filter 2s ease-in-out, opacity 0.5s;
        }

        #video-iframe {
            display: none;
            width: 100%;
            height: 100%;
            border: 1px solid #333;
        }

        .dimmed { filter: grayscale(100%) brightness(0.2); }

        #name-tag {
            font-size: 0.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--gold);
            margin-top: 8px;
            opacity: 0;
            transition: opacity 1.5s;
        }

        #history-display {
            height: 180px;
            margin-bottom: 10px;
            display: none;
            justify-content: center;
            align-items: center;
        }

        #history-img {
            max-width: 100%;
            max-height: 100%;
            border: 1px solid #444;
            cursor: zoom-in;
        }

        #dialogue-box {
            min-height: 120px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #text-target {
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 0;
        }

        .show-text { opacity: 1 !important; }

        @keyframes wordFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0);   }
        }

        .word-anim {
            display: inline;
            opacity: 0;
            animation: wordFadeIn 0.28s ease forwards;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            min-height: 60px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-group.menu-mode {
            flex-direction: column;
            align-items: stretch;
            gap: 8px;
        }

        button {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 8px 18px;
            cursor: pointer;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: inherit;
            transition: all 0.3s;
        }

        button:hover { background: var(--gold); color: var(--bg); }

        #end-instruction {
            color: var(--text);
            font-size: 0.95rem;
            margin-top: 15px;
            display: none;
            font-style: italic;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        #lang-toggle {
            display: none;
            position: absolute;
            top: 12px;
            right: 18px;
            gap: 4px;
        }

        #lang-toggle button {
            padding: 3px 9px;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            border: 1px solid #555;
            color: #888;
            text-transform: none;
        }

        #lang-toggle button:hover,
        #lang-toggle button.active {
            background: transparent;
            border-color: var(--gold);
            color: var(--gold);
        }

        /* Lightbox for zoomable images */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            overflow-y: auto;
            text-align: center;
            padding-top: 60px;
            box-sizing: border-box;
        }

        #lightbox img {
            max-width: 75%;
            margin-bottom: 40px;
            cursor: zoom-in;
            transition: transform 0.3s ease;
            border: 1px solid #444;
            transform-origin: center top;
        }

        #lightbox img.zoomed {
            transform: scale(1.6);
            cursor: zoom-out;
            z-index: 10001;
            position: relative;
        }

        .close-lb {
            position: fixed;
            top: 20px;
            right: 40px;
            color: var(--gold);
            font-size: 50px;
            cursor: pointer;
            z-index: 10002;
            font-weight: bold;
            user-select: none;
            line-height: 1;
        }

        .close-lb:hover {
            color: #fff;
        }

    </style>
    <script src="scripts.js"></script>
</head>
<body>

<div id="lightbox" onclick="closeLightbox()"></div>

<div id="kiosk-container">
    <div id="lang-toggle">
        <button onclick="switchLanguage('en')" id="lt-en">EN</button>
        <button onclick="switchLanguage('zh')" id="lt-zh">繁</button>
        <button onclick="switchLanguage('sc')" id="lt-sc">简</button>
    </div>
    <h1 id="main-title">
        Narrative Stele Prototype 叙事碑原型
    </h1>

    <div id="media-main-area">
        <img id="main-display-img" src="images/Start_NarrativeStele.jpg" alt="Gallery View">
        <iframe id="video-iframe" allow="autoplay; fullscreen" src=""></iframe>
    </div>
    
    <div id="name-tag"></div>

    <div id="history-display">
        <img id="history-img" src="" alt="Archival View">
    </div>

    <div id="dialogue-box">
        <p id="text-target">Please select a language / 請選擇語言 / 请选择语言</p>
    </div>

    <div class="btn-group" id="actions">
        <button onclick="setLanguage('en')">English</button>
        <button onclick="setLanguage('zh')">繁體中文</button>
        <button onclick="setLanguage('sc')">简体中文</button>
    </div>

    <p id="end-instruction"></p>
</div>

<script>
    const textTarget = document.getElementById('text-target');
    const actions = document.getElementById('actions');
    const mainImg = document.getElementById('main-display-img');
    const mediaMainArea = document.getElementById('media-main-area');
    const videoIframe = document.getElementById('video-iframe');
    const nameTag = document.getElementById('name-tag');
    const historyDisplay = document.getElementById('history-display');
    const historyImg = document.getElementById('history-img');
    const endInstruct = document.getElementById('end-instruction');
    const lightbox = document.getElementById('lightbox');

    let currentLang = 'en';
    let currentCharacter = 'LS';
    let currentStep = null; // null = on menu, "end" = end state, otherwise step key


    (function(data) {


        const langToggle = document.getElementById('lang-toggle');

        function updateLangToggle() {
            langToggle.style.display = 'flex';
            ['en', 'zh', 'sc'].forEach(l => {
                document.getElementById('lt-' + l).classList.toggle('active', l === currentLang);
            });
        }

        function setLanguage(lang) {
            currentLang = lang;
            updateLangToggle();
            showCharacterMenu();
        }

        function switchLanguage(lang) {
            if (lang === currentLang) return;
            currentLang = lang;
            updateLangToggle();
            if (currentStep === null) {
                showCharacterMenu();
            } else if (currentStep === 'end') {
                handleEndState();
            } else {
                nameTag.innerText = data[currentLang][currentCharacter].name;
                renderStep(currentStep);
            }
        }

        function showCharacterMenu() {
            currentStep = null;
            actions.innerHTML = '';
            textTarget.classList.remove('show-text');

            // Reset Media Display
            mediaMainArea.style.height = '250px';
            mainImg.style.display = 'block';
            mainImg.style.height = '100%';
            mainImg.src = 'images/Start_NarrativeStele.jpg';
            videoIframe.style.display = 'none';
            videoIframe.src = '';
            mainImg.style.cursor = 'default';
            mainImg.onclick = null;
            historyDisplay.style.display = 'none';
        
            const characters = ['LS', 'LD', 'ST', 'WZ'];
        
            setTimeout(() => {
                textTarget.innerText = data[currentLang].menuTitle;
                textTarget.classList.add('show-text');

                actions.classList.add('menu-mode');
                characters.forEach(id => {
                    const btn = document.createElement('button');
                    btn.innerText = data[currentLang][id].name;
                    btn.onclick = () => {
                        currentCharacter = id;
                        beginInteraction();
                    };
                    actions.appendChild(btn);
                });
            }, 400);
        }

        function beginInteraction() {
            actions.classList.remove('menu-mode');
            // Reset Media Display
            mediaMainArea.style.height = '250px';
            mainImg.style.display = 'block';
            videoIframe.style.display = 'none';
            videoIframe.src = '';
            mainImg.style.cursor = 'default';
            mainImg.onclick = null;
        
            mainImg.classList.add('dimmed');
            mainImg.src = data[currentLang][currentCharacter].portrait;
            nameTag.innerText = data[currentLang][currentCharacter].name;
        
            setTimeout(() => {
                mainImg.classList.remove('dimmed');
                nameTag.style.opacity = "1";
                renderStep(0);
            }, 500);
        }

        function animateText(el, text) {
            el.innerHTML = '';
            // Tokenize: CJK characters one at a time, Latin words grouped
            const tokens = [];
            const parts = text.match(/[⺀-⻿　-鿿豈-﫿가-힯぀-ヿ]|[^⺀-⻿　-鿿豈-﫿가-힯぀-ヿ]+/g) || [];
            for (const part of parts) {
                if (/[⺀-⻿　-鿿豈-﫿가-힯぀-ヿ]/.test(part)) {
                    tokens.push(part);
                } else {
                    const words = part.match(/\S+\s*/g) || [];
                    tokens.push(...words);
                }
            }
            let offset = 0;
            tokens.forEach(token => {
                const isCJK = /[⺀-⻿　-鿿豈-﫿가-힯぀-ヿ]/.test(token);
                const span = document.createElement('span');
                span.className = 'word-anim';
                span.style.animationDelay = offset + 'ms';
                span.textContent = token;
                el.appendChild(span);
                offset += isCJK ? 40 : 90;
            });
        }

        function renderStep(stepKey) {
            currentStep = stepKey;
            if (stepKey === "end") {
                handleEndState();
                return;
            }
            const stepData = data[currentLang][currentCharacter].steps[stepKey];
            actions.innerHTML = '';
            textTarget.innerHTML = '';
            setTimeout(() => {
                if (stepData.image) {
                    historyImg.src = stepData.image;
                    historyImg.onclick = () => openLightbox([stepData.image]);
                    historyDisplay.style.display = 'flex';
                    mainImg.style.height = "120px";
                } else {
                    historyDisplay.style.display = 'none';
                    mainImg.style.height = "100%";
                }
                animateText(textTarget, stepData.text);
                if (stepData.choices) {
                    stepData.choices.forEach(c => {
                        const btn = document.createElement('button');
                        btn.innerText = c.label;
                        btn.onclick = () => renderStep(c.next);
                        actions.appendChild(btn);
                    });
                } else {
                    const btn = document.createElement('button');
                    btn.innerText = data[currentLang][currentCharacter].continueBtn || "Continue";
                    btn.onclick = () => renderStep(stepData.next);
                    actions.appendChild(btn);
                }
            }, 400);
        }

        function openLightbox(images) {
            lightbox.innerHTML = '<span class="close-lb" onclick="closeLightbox()">&times;</span>';
        
            images.forEach(src => {
                let img = document.createElement('img');
                img.src = src;
                img.onclick = (e) => {
                    e.stopPropagation();
                    img.classList.toggle('zoomed');
                };
                lightbox.appendChild(img);
            });
        
            lightbox.style.display = 'block';
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
            const zoomedImgs = lightbox.querySelectorAll('img.zoomed');
            zoomedImgs.forEach(img => img.classList.remove('zoomed'));
        }

        function handleEndState() {
            textTarget.classList.remove('show-text');
            textTarget.innerHTML = '';
            historyDisplay.style.display = 'none';

            const nextMap = { 'LS': 'LD', 'LD': 'ST', 'ST': 'WZ' };
            const standbyImages = {
                'LS': 'images/Sickman_Standby.jpg',
                'LD': 'images/Liu_Standby.jpg',
                'ST': 'images/Shen_Standby.jpg',
                'WZ': 'images/Wang_Standby.jpg'
            };

            mainImg.src = standbyImages[currentCharacter];
            mainImg.style.display = 'block';
            mainImg.style.height = '450px';
            mediaMainArea.style.height = '450px';
            mainImg.style.cursor = "default";
            mainImg.onclick = null;
            nameTag.style.opacity = "0";

            setTimeout(() => {
                actions.innerHTML = '';
                if (nextMap[currentCharacter]) {
                    const btn = document.createElement('button');
                    btn.innerText = data[currentLang][currentCharacter].nextSteleBtn;
                    btn.onclick = () => {
                        currentCharacter = nextMap[currentCharacter];
                        beginInteraction();
                    };
                    actions.appendChild(btn);
                } else {
                    const btn = document.createElement('button');
                    btn.innerText = data[currentLang][currentCharacter].restartBtn || "Restart";
                    btn.onclick = () => location.reload();
                    actions.appendChild(btn);
                }

                const menuBtn = document.createElement('button');
                menuBtn.innerText = currentLang === 'en' ? "Back to Menu" : (currentLang === 'zh' ? "返回菜單" : "返回菜单");
                menuBtn.onclick = showCharacterMenu;
                actions.appendChild(menuBtn);
            }, 500);
        }

        window.setLanguage = setLanguage;
        window.switchLanguage = switchLanguage;
        window.openLightbox = openLightbox;
        window.closeLightbox = closeLightbox;

    })(SCRIPTS_DATA);
</script>

</body>
</html>
